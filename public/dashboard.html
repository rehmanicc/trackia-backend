<!DOCTYPE html>
<html>

<head>

    <title>Trackia Live Tracking</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

</head>

<body>

    <div style="display:flex;height:100vh;">

        <!-- SIDEBAR -->
        <div id="sidebar" style="width:320px;background:#f5f5f5;padding:10px;overflow:auto;">

            <h2>Trackia Dashboard</h2>

            <button onclick="logout()">Logout</button>

            <hr>

            <!-- ADMIN PANEL -->
            <div id="adminPanel" style="display:none;">

                <h3>Admin Panel</h3>

                <h4>Create User</h4>
                <input id="newUserName" placeholder="Name" style="width:100%;margin-bottom:5px;">
                <input id="newUserEmail" placeholder="Email" style="width:100%;margin-bottom:5px;">
                <input id="newUserPassword" placeholder="Password" type="password"
                    style="width:100%;margin-bottom:5px;">

                <select id="newUserRole" style="width:100%;margin-bottom:5px;"></select>

                <button onclick="createUser()">Create User</button>

                <hr>

                <h4>Add Vehicle</h4>
                <input id="vehicleName" placeholder="Vehicle Name" style="width:100%;margin-bottom:5px;">
                <input id="vehicleUniqueId" placeholder="Tracker IMEI / Unique ID"
                    style="width:100%;margin-bottom:5px;">

                <button onclick="addDevice()">Add Vehicle</button>

            </div>

            <hr>

            <!-- USER PANEL -->
            <div id="userPanel" style="display:none;">
                <h3>User Panel</h3>
                <p>You can create up to <b>3 geofences</b></p>
            </div>

            <hr>

            <!-- ROUTE HISTORY -->
            <h3>Route History</h3>

            <input id="routeDeviceId" placeholder="Device ID" style="width:100%;margin-bottom:5px;">
            <input id="fromTime" type="datetime-local" style="width:100%;margin-bottom:5px;">
            <input id="toTime" type="datetime-local" style="width:100%;margin-bottom:5px;">

            <button onclick="showRoute()">Show Route</button>

            <!-- ✅ TRIP SUMMARY (CORRECT POSITION) -->
            <div id="tripSummary" style="
                background:#fff;
                padding:12px;
                margin-top:10px;
                border-radius:8px;
                border:1px solid #ccc;
                box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            ">
                <h3 style="margin-bottom:10px;">🚗 Trip Summary</h3>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><b>Distance:</b> <span id="sumDistance">0</span> km</div>
                    <div><b>Duration:</b> <span id="sumDuration">0</span></div>
                    <div><b>Avg Speed:</b> <span id="sumSpeed">0</span> km/h</div>
                    <div><b>Stops:</b> <span id="sumStops">0</span></div>
                    <div><b>Idle Time:</b> <span id="sumIdle">0</span> min</div>
                </div>
            </div>

            <hr>

            <!-- VEHICLES -->
            <h3>Vehicles</h3>
            <div id="vehicleList"></div>

            <hr>

            <!-- VEHICLE DETAILS -->
            <div id="vehicleDetails" style="margin-top:10px;"></div>

            <hr>

            <!-- ALERTS -->
            <h3>Alerts</h3>
            <div style="padding:8px; border-bottom:1px solid #ccc; background:#fafafa;">

                <select id="alertTypeFilter">
                    <option value="all">All</option>
                    <option value="enter">Entered</option>
                    <option value="exit">Exited</option>
                </select>

                <input type="text" id="vehicleSearch" placeholder="Search Vehicle ID..."
                    style="margin-left:10px; padding:4px;">
            </div>

            <div id="alertList"></div>

            <hr>

            <!-- ROUTE PLAYBACK -->
            <h3>Route Playback</h3>

            <input id="playbackDeviceId" placeholder="Device ID" style="width:100%;margin-bottom:5px;">
            <input id="playbackDate" type="date" style="width:100%;margin-bottom:10px;">

            <button onclick="startPlayback()">Start Playback</button>

        </div>

        <!-- MAP -->
        <div id="map" style="flex:1; position:relative;">

            <div id="playbackControl">
                <div id="playbackRow">

                    <div id="playToggleBtn" onclick="togglePlayback()">▶</div>

                    <input type="range" id="timeSlider" min="0" max="100" value="0" style="flex:2;">

                    <div id="speedContainer">
                        <input type="range" id="speedSlider" min="0.5" max="16" step="0.2" value="1">
                        <span id="speedLabel">1x</span>
                    </div>

                </div>

                <div id="timeLabel">00:00:00</div>
            </div>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
