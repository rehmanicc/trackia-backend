<!DOCTYPE html>
<html>

<head>

    <title>Trackia Live Tracking</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">🚀 Trackia</div>

            <nav>
                <ul>
                    <li class="active">📍 Live Tracking</li>
                    <li onclick="openAnalytics()">📊 Analytics</li>
                    <li>📦 Fleet</li>
                    <li>📍 Geofencing</li>
                    <li>⚙️ Settings</li>
                </ul>
            </nav>

            <div class="user">
                <button onclick="logout()">Logout</button>
            </div>
        </aside>


        <!-- MAIN AREA -->
        <div class="main">

            <!-- HEADER -->
            <header class="header">
                <div>
                    <h2>Live Tracking</h2>
                    <p>Real-time fleet monitoring</p>
                </div>

                <div class="status">
                    🟢 Live Updates Active
                </div>
            </header>

            <!-- ✅ MOVE STATS BAR HERE -->
            <div class="stats-bar">

                <div class="stat-card moving">
                    <span id="countMoving">0</span>
                    <p>Moving</p>
                </div>

                <div class="stat-card idle">
                    <span id="countIdle">0</span>
                    <p>Idle</p>
                </div>

                <div class="stat-card stopped">
                    <span id="countStopped">0</span>
                    <p>Stopped</p>
                </div>

                <div class="stat-card offline">
                    <span id="countOffline">0</span>
                    <p>Offline</p>
                </div>

            </div>

            <!-- CONTENT -->
            <div class="content">

                <!-- VEHICLE PANEL -->
                <div class="vehicle-panel">

                    <div class="filters">

                        <input type="text" id="searchInput" placeholder="Search vehicles..." />

                        <select id="statusFilter">
                            <option value="all">All</option>
                            <option value="moving">Moving</option>
                            <option value="idle">Idle</option>
                            <option value="stopped">Stopped</option>
                            <option value="offline">Offline</option>
                        </select>

                    </div>

                    <div id="vehicleList" class="vehicle-list"></div>

                </div>


                <!-- MAP -->
                <div id="map" class="map-container">

                    <!-- KEEP PLAYBACK -->
                    <div id="playbackControl">
                        <div id="playbackRow">
                            <div id="playToggleBtn" onclick="togglePlayback()">▶</div>

                            <input type="range" id="timeSlider">

                            <div id="speedContainer">
                                <input type="range" id="speedSlider" min="0.5" max="16" step="0.2" value="1">
                                <span id="speedLabel">1x</span>
                            </div>
                        </div>

                        <div id="timeLabel">00:00:00</div>
                    </div>

                </div>

            </div>
        </div>
        

        <script src="js/api.js"></script>
        <script src="js/dashboard.js"></script>

</body>

</html>
