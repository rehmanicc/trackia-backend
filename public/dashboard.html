<!DOCTYPE html>
<html>

<head>

    <title>Trackia Live Tracking</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>
    <script src="/js/alerts/alertManager.js"></script>
    <script src="/js/alerts/alertUI.js"></script>
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">🚀 Trackia</div>

            <nav>
                <ul>
                    <li onclick="setActiveMenu(this); openLive()">📡 Live Tracking</li>
                    <li onclick="setActiveMenu(this); openAnalytics()">📊 Analytics</li>
                    <li onclick="setActiveMenu(this); openDevices()">📦 Devices</li>
                    <li onclick="setActiveMenu(this); openGeofence()">📍 Geofencing</li>
                    <li onclick="openAlerts()"> 🚨 Alerts</li>
                    <li>⚙️ Settings</li>
                </ul>
            </nav>

            <div class="user">
                <button onclick="logout()">Logout</button>
            </div>
        </aside>


        <!-- MAIN AREA -->
        <div class="main">

            <!-- HEADER -->
            <header class="header">
                <div>
                    <h2>Live Tracking</h2>
                    <p>Real-time fleet monitoring</p>
                </div>

                <div class="status">
                    🟢 Live Updates Active
                </div>
            </header>

            <!-- ✅ MOVE STATS BAR HERE -->
            <div class="stats-bar">

                <div class="stat-card moving">
                    <span id="countMoving">0</span>
                    <p>Moving</p>
                </div>

                <div class="stat-card idle">
                    <span id="countIdle">0</span>
                    <p>Idle</p>
                </div>

                <div class="stat-card stopped">
                    <span id="countStopped">0</span>
                    <p>Stopped</p>
                </div>

                <div class="stat-card offline">
                    <span id="countOffline">0</span>
                    <p>Offline</p>
                </div>

            </div>

            <!-- CONTENT -->
            <div class="content">

                <!-- VEHICLE PANEL -->
                <div class="vehicle-panel">

                    <div class="filters">

                        <input type="text" id="searchInput" placeholder="Search vehicles..." />

                        <select id="statusFilter">
                            <option value="all">All</option>
                            <option value="moving">Moving</option>
                            <option value="idle">Idle</option>
                            <option value="stopped">Stopped</option>
                            <option value="offline">Offline</option>
                        </select>

                    </div>

                    <div id="vehicleList" class="vehicle-list"></div>

                </div>
                <div id="geofencePanel" class="vehicle-panel" style="display:none;">

                    <div style="padding:10px;">
                        <button onclick="openGeofence()">➕ Add Geofence</button>
                        <button onclick="deleteSelectedGeofence()">🗑 Delete</button>
                    </div>

                    <div id="geofenceList"></div>

                </div>
                <div id="modalOverlay"></div>

                <div id="addDeviceModal"
                    style="display:none; position:fixed; top:30%; left:40%; background:#fff; padding:20px; border:1px solid #ccc;">

                    <h4>Add Device</h4>

                    <input id="deviceNameInput" placeholder="Device Name"><br><br>
                    <input id="deviceUniqueInput" placeholder="IMEI / Unique ID"><br><br>

                    <button onclick="submitNewDevice()">Add</button>
                    <button onclick="closeAddDeviceModal()">Cancel</button>

                </div>
                <div id="devicePanel" class="vehicle-panel" style="display:none;">

                    <div style="padding:10px;">
                        <button class="primary-btn" onclick="openAddDeviceModal()">➕ Add Device</button>
                    </div>

                    <div id="deviceList"></div>

                </div>
                <div id="assignModal"
                    style="display:none; position:fixed; top:30%; left:40%; background:#fff; padding:20px; border:1px solid #ccc; z-index:1000;">

                    <h4>Assign Device</h4>

                    <select id="assignUserSelect"></select><br><br>

                    <button onclick="submitAssign()">Assign</button>
                    <button onclick="closeAssign()">Cancel</button>

                </div>
                <div id="alertPanel" class="vehicle-panel" style="display:none;">
                    <h3>🚨 Alerts</h3>

                    <div style="margin-bottom:10px;">
                        <select id="alertTypeFilter">
                            <option value="all">All</option>
                            <option value="engine_on">Engine ON</option>
                            <option value="engine_off">Engine OFF</option>
                            <option value="geofence_enter">Geofence Enter</option>
                            <option value="geofence_exit">Geofence Exit</option>
                        </select>

                        <input type="text" id="vehicleSearch" placeholder="Search vehicle">
                    </div>

                    <div id="alertList"></div>
                </div>
                <!-- MAP -->
                <div id="map" class="map-container">

                    <!-- KEEP PLAYBACK -->
                    <div id="playbackControl">
                        <div id="playbackRow">
                            <div id="playToggleBtn" onclick="togglePlayback()">▶</div>

                            <input type="range" id="timeSlider">

                            <div id="speedContainer">
                                <input type="range" id="speedSlider" min="0.5" max="16" step="0.2" value="1">
                                <span id="speedLabel">1x</span>
                            </div>
                        </div>

                        <div id="timeLabel">00:00:00</div>
                    </div>

                </div>

            </div>
        </div>


        <script type="module" src="public/js/dashboard.js"></script>
</body>

</html>
